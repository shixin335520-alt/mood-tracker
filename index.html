<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>雲端同步心情溫度計 - 修復版</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f9; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #2c3e50; border-left: 5px solid var(--primary); padding-left: 15px; }
        canvas { width: 100%; background: #fff; border-radius: 8px; cursor: crosshair; border: 1px solid #eee; display: block; }
        select { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 16px; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .note-box { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .note-box span { font-weight: bold; display: block; margin-bottom: 5px; color: var(--primary); }
        textarea { width: 100%; height: 100px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; resize: none; }
        .status { font-size: 13px; color: #27ae60; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>雲端同步心情溫度計</h2>
        <div id="syncStatus" class="status">● 雲端連線中...</div>
        <select id="dateSelect"></select>
        <canvas id="dayChart" width="800" height="320"></canvas>
    </div>
    <div class="card">
        <h2>週趨勢與覺察筆記</h2>
        <canvas id="weekChart" width="1400" height="320"></canvas>
        <div id="notes" class="notes-grid"></div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBj3pvp-UrqNuFFqWQPD5OVoieuJI5DeoE",
  authDomain: "mood-81873.firebaseapp.com",
  databaseURL: "https://mood-81873-default-rtdb.firebaseio.com",
  projectId: "mood-81873",
  storageBucket: "mood-81873.firebasestorage.app",
  messagingSenderId: "888330529357",
  appId: "1:888330529357:web:46058d2f5298126e4c0a04",
  measurementId: "G-JBSLK9DLWL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const times = ["9","11","13","15","17","19","21","23"];
const dates = [
    "3/30 (一)","3/31 (二)","4/01 (三)","4/02 (四)","4/03 (五)","4/04 (六)","4/05 (日)",
    "4/06 (一)","4/07 (二)","4/08 (三)","4/09 (四)","4/10 (五)","4/11 (六)","4/12 (日)",
    "4/13 (一)","4/14 (二)","4/15 (三)","4/16 (四)","4/17 (五)","4/18 (六)","4/19 (日)"
];

let allData = {}, noteData = {}, weekData = {};
const ds = document.getElementById("dateSelect");
const notesDiv = document.getElementById("notes");

// 1. 初始化資料結構與 UI
dates.forEach(d => {
    let o = document.createElement("option"); o.text = d; ds.add(o);
    allData[d] = {};
    let box = document.createElement("div");
    box.className = "note-box";
    box.innerHTML = `<span>${d}</span><textarea id="note-${d}" placeholder="今天的觀察..." oninput="saveNote('${d}', this.value)"></textarea>`;
    notesDiv.appendChild(box);
});

// 2. 監聽 Firebase 資料
db.ref('moodData').on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) {
        allData = data.scores || allData;
        noteData = data.notes || {};
        dates.forEach(d => {
            const el = document.getElementById(`note-${d}`);
            if(noteData[d] !== undefined && el !== document.activeElement) {
                el.value = noteData[d];
            }
        });
        refresh();
        document.getElementById("syncStatus").innerText = "● 雲端已同步 (實時)";
    }
});

function saveScore(date, time, val) {
    db.ref('moodData/scores/' + date + '/' + time).set(val);
}

function saveNote(date, text) {
    db.ref('moodData/notes/' + date).set(text);
}

function updateWeekData() {
    dates.forEach(d => {
        let dayScores = allData[d];
        if(dayScores) {
            let vals = Object.values(dayScores);
            if(vals.length > 0) {
                weekData[d] = vals.reduce((a, b) => a + b) / vals.length;
            } else { delete weekData[d]; }
        }
    });
}

function refresh() {
    drawChart("dayChart", allData[ds.value] || {}, times, 90, false);
    updateWeekData();
    drawChart("weekChart", weekData, dates, 60, true);
}

function drawAxes(ctx, w, h, xGap, labels, type) {
    ctx.strokeStyle = "#e0e0e0";
    ctx.lineWidth = 1;
    for(let i = -10; i <= 10; i += 5) {
        let y = 160 - i * 10; // 修正坐標軸中心點
        ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(w-10, y); ctx.stroke();
        ctx.fillStyle = "#999"; ctx.font = "12px Arial";
        ctx.fillText(i, 15, y+5);
    }
    ctx.strokeStyle = "#333";
    ctx.beginPath(); ctx.moveTo(50, 10); ctx.lineTo(50, h-30); ctx.stroke();
    ctx.fillStyle = "#666";
    labels.forEach((l, i) => {
        let x = 70 + i * xGap;
        ctx.fillText(type === 'day' ? l+":00" : l.split(' ')[0], x - 15, h-10);
    });
}

function drawChart(id, data, labels, xGap, isWeek) {
    let c = document.getElementById(id), ctx = c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height);
    drawAxes(ctx, c.width, c.height, xGap, labels, isWeek ? 'week' : 'day');

    let points = [];
    labels.forEach((l, i) => {
        let v = data[l];
        if (v !== undefined) {
            points.push({ x: 70 + i * xGap, y: 160 - v * 10 });
        }
    });

    if (points.length > 0) {
        ctx.beginPath();
        ctx.strokeStyle = isWeek ? "#ff9f43" : "#4a90e2";
        ctx.lineWidth = 3;
        points.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();

        points.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = isWeek ? "#ff9f43" : "#4a90e2";
            ctx.lineWidth = 2; ctx.stroke();
        });
    }
}

// 監聽日版點擊
document.getElementById("dayChart").addEventListener("mousedown", e => {
    let r = e.target.getBoundingClientRect();
    // 考慮 Canvas 實際顯示比例
    let scaleX = e.target.width / r.width;
    let scaleY = e.target.height / r.height;
    let x = (e.clientX - r.left) * scaleX;
    let y = (e.clientY - r.top) * scaleY;

    // 找到最接近的時間點
    let i = Math.round((x - 70) / 90);
    if (i >= 0 && i < times.length) {
        let val = Math.round((160 - y) / 10);
        val = Math.max(-10, Math.min(10, val));
        saveScore(ds.value, times[i], val);
    }
});

ds.addEventListener("change", refresh);
</script>
</body>
</html>
