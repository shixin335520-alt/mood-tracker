<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>雲端心情溫度計 (Google Sheets 版)</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f4f7f9; --text: #333; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 30px; }
        h2 { border-left: 5px solid var(--primary); padding-left: 15px; color: #2c3e50; }
        canvas { width: 100%; border-radius: 12px; border: 1px solid #eee; background: #fff; cursor: crosshair; }
        select { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; margin-bottom: 15px; background: white; }
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .note-box { background: #fafafa; border: 1px solid #eee; border-radius: 12px; padding: 15px; }
        .note-box span { font-weight: bold; display: block; margin-bottom: 8px; color: var(--primary); }
        textarea { width: 100%; height: 100px; resize: none; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 14px; }
        .sync-status { font-size: 13px; color: #27ae60; font-weight: bold; margin-bottom: 10px; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div>☁️ 正在與 Google 試算表同步資料...</div>
    <div style="font-size: 0.9rem; color: #888; margin-top: 10px;">第一次載入可能需要 3-5 秒</div>
</div>

<div class="container">
    <div class="card">
        <h2>雲端心情溫度計</h2>
        <div id="status" class="sync-status">狀態：連線中...</div>
        <select id="dateSelect"></select>
        <canvas id="dayChart" width="800" height="320"></canvas>
    </div>

    <div class="card">
        <h2>週版心情趨勢 (21天)</h2>
        <canvas id="weekChart" width="1400" height="320"></canvas>
        <h3 style="margin-top:30px">每日覺察紀錄 (自動存檔)</h3>
        <div id="notes" class="notes-grid"></div>
    </div>
</div>

<script>
// 已填入你的 Google Apps Script 部署網址
const GAS_URL = "https://script.google.com/macros/s/AKfycbxl5B5kWbV1CSAE9W63-iSISX4KlxtU3y4bvGCgNcveSUR_qw0Aae2ZpXFV3Y-kjJ-w/exec";

const times = ["9","11","13","15","17","19","21","23"];
const dates = ["3/30 (一)","3/31 (二)","4/01 (三)","4/02 (四)","4/03 (五)","4/04 (六)","4/05 (日)","4/06 (一)","4/07 (二)","4/08 (三)","4/09 (四)","4/10 (五)","4/11 (六)","4/12 (日)","4/13 (一)","4/14 (二)","4/15 (三)","4/16 (四)","4/17 (五)","4/18 (六)","4/19 (日)"];

let allData = {}, noteData = {}, weekData = {};
const ds = document.getElementById("dateSelect");
const notesDiv = document.getElementById("notes");

// 初始化 UI 介面
dates.forEach(d => {
    let o = document.createElement("option"); o.text = d; ds.add(o);
    allData[d] = {};
    let box = document.createElement("div"); box.className = "note-box";
    box.innerHTML = `<span>${d}</span><textarea id="note-${d}" placeholder="寫下今天的心情紀錄..."></textarea>`;
    notesDiv.appendChild(box);
    // 監聽失去焦點 (blur) 或 內容改變 (change) 時儲存，減少傳輸頻率
    box.querySelector('textarea').addEventListener('change', (e) => saveContent('note', d, e.target.value));
});

// 與雲端同步資料 (讀取)
async function syncFromCloud() {
    try {
        const response = await fetch(GAS_URL, { 
            method: 'POST', 
            body: JSON.stringify({ action: 'load' }) 
        });
        const data = await response.json();
        allData = data.scores || {};
        noteData = data.notes || {};
        
        // 更新筆記內容到畫面
        dates.forEach(d => {
            if (noteData[d]) document.getElementById(`note-${d}`).value = noteData[d];
        });
        
        document.getElementById('loadingOverlay').style.display = 'none';
        document.getElementById('status').innerText = "狀態：☁️ 雲端同步成功";
        refresh();
    } catch (e) {
        console.error(e);
        document.getElementById('status').innerText = "狀態：❌ 同步失敗，請確認 GAS 權限已設為「所有人」";
    }
}

// 儲存資料到雲端
async function saveContent(type, key, value) {
    document.getElementById('status').innerText = "狀態：✍️ 正在寫入雲端...";
    try {
        const payload = { 
            action: 'save', 
            type: type, 
            key: key, 
            value: value 
        };
        // 使用 no-cors 是因為 GAS POST 轉向機制，雖然看不到 return 但資料會進去
        await fetch(GAS_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(payload) 
        });
        document.getElementById('status').innerText = "狀態：✅ 已同步到試算表";
        refresh();
    } catch (e) {
        document.getElementById('status').innerText = "狀態：⚠️ 儲存失敗";
    }
}

function drawAxes(ctx, w, h, xGap, labels, type) {
    ctx.strokeStyle = "#e0e0e0"; ctx.lineWidth = 1;
    for(let i = -10; i <= 10; i += 5) {
        let y = h/2 - i*10;
        ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(w-10, y); ctx.stroke();
        ctx.fillStyle = "#999"; ctx.font = "12px Arial";
        ctx.fillText(i, 15, y+5);
    }
    ctx.strokeStyle = "#333"; ctx.beginPath(); ctx.moveTo(50, 10); ctx.lineTo(50, h-30); ctx.stroke();
    ctx.fillStyle = "#666";
    labels.forEach((l, i) => {
        let x = 70 + i * xGap;
        ctx.fillText(type === 'day' ? l+":00" : l.split(' ')[0], x - 15, h-10);
    });
}

function drawChart(id, data, labels, xGap, isW) {
    let c = document.getElementById(id), ctx = c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height);
    drawAxes(ctx,c.width,c.height,xGap,labels,isW?'week':'day');
    let pts = [];
    labels.forEach((l, i) => {
        let v = isW ? data[l] : (allData[ds.value] || {})[l];
        if (v !== undefined) pts.push({ x: 70 + i * xGap, y: 160 - v * 10 });
    });
    if (pts.length > 0) {
        ctx.beginPath(); ctx.strokeStyle = isW ? "#ff9f43" : "#4a90e2"; ctx.lineWidth = 3;
        pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();
        pts.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
            ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = isW ? "#ff9f43" : "#4a90e2"; ctx.lineWidth = 2; ctx.stroke();
        });
    }
}

function refresh() {
    drawChart("dayChart", null, times, 90, false);
    dates.forEach(d => {
        let v = Object.values(allData[d] || {});
        if(v.length > 0) weekData[d] = v.reduce((a,b)=>a+b)/v.length;
        else delete weekData[d];
    });
    drawChart("weekChart", weekData, dates, 60, true);
}

// 點擊圖表標記心情
document.getElementById("dayChart").addEventListener("click", e => {
    let r = e.target.getBoundingClientRect();
    let x = (e.clientX - r.left) * (e.target.width / r.width);
    let y = (e.clientY - r.top) * (e.target.height / r.height);
    let i = Math.round((x - 70) / 90);
    if (i >= 0 && i < times.length) {
        let val = Math.round((160 - y) / 10);
        val = Math.max(-10, Math.min(10, val));
        if(!allData[ds.value]) allData[ds.value] = {};
        allData[ds.value][times[i]] = val;
        // 儲存格式為 "日期|時間"
        saveContent('score', `${ds.value}|${times[i]}`, val);
    }
});

ds.addEventListener("change", refresh);
window.onload = syncFromCloud;
</script>
</body>
</html>
